<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RUN TO DO</title>
  <meta name="description" content="함께 달리는 러닝 일정 앱 — RUN TO DO" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="RUN TO DO" />
  <meta property="og:description" content="함께 달리는 러닝 일정을 확인해보세요!" />
  <meta property="og:image" content="https://aprilsixth46-boop.github.io/runtodo/profile.png" />
  <meta property="og:url" content="https://aprilsixth46-boop.github.io/runtodo/" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="logo">RUN TO DO</h1>
      <p class="tagline">@leejisaurus</p>
    </header>

    <section class="today-section" aria-labelledby="today-heading">
      <h2 id="today-heading" class="section-title">오늘의 런</h2>
      <div id="today-runs" class="today-runs"></div>
    </section>

    <div class="actions">
      <button type="button" class="btn btn-primary" id="open-modal-btn">
        <span class="btn-icon" aria-hidden="true">+</span>
        새 러닝 일정 추가
      </button>
    </div>

    <section class="list-section" aria-labelledby="list-heading">
      <div class="section-header">
        <h2 id="list-heading" class="section-title">러닝 일정</h2>
        <div class="view-toggle" role="group" aria-label="보기 방식">
          <button type="button" class="view-toggle__btn is-active" id="btn-list-view" data-view="list">리스트</button>
          <button type="button" class="view-toggle__btn" id="btn-calendar-view" data-view="calendar">캘린더</button>
        </div>
      </div>

      <div id="view-list">
        <div class="list-filter" role="group" aria-label="필터">
          <button type="button" class="list-filter__btn is-active" id="btn-filter-upcoming">Upcoming</button>
          <button type="button" class="list-filter__btn list-filter__btn--fav" id="btn-filter-fav">♡ Favorite</button>
          <button type="button" class="list-filter__btn" id="btn-filter-past">Past</button>
        </div>
        <ul id="schedule-list" class="schedule-list"></ul>
      </div>

      <div id="view-calendar" hidden>
        <div class="cal-nav">
          <button type="button" class="cal-nav__btn" id="cal-prev" aria-label="이전 달">‹</button>
          <span class="cal-nav__label" id="cal-label"></span>
          <button type="button" class="cal-nav__btn" id="cal-next" aria-label="다음 달">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </section>
  </div>

  <!-- Detail modal -->
  <div class="modal-backdrop" id="detail-backdrop" hidden></div>
  <div class="modal" id="detail-modal" role="dialog" aria-modal="true" aria-labelledby="detail-title" hidden>
    <div class="modal-inner">
      <div class="modal-header">
        <h2 id="detail-title" class="detail-modal__title"></h2>
        <button type="button" class="btn-icon-only" id="detail-close-btn" aria-label="닫기">×</button>
      </div>
      <div class="detail-body" id="detail-body"></div>
      <div class="modal-footer detail-modal__footer">
        <button type="button" class="btn btn-ghost" id="detail-delete-btn">삭제</button>
        <button type="button" class="btn btn-fav" id="detail-fav-btn" aria-label="즐겨찾기">♡</button>
        <button type="button" class="btn btn-share" id="detail-share-btn" aria-label="공유">↗</button>
        <button type="button" class="btn btn-primary" id="detail-edit-btn">수정</button>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop" hidden></div>
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-inner">
      <div class="modal-header">
        <h2 id="modal-title">새 러닝 일정</h2>
        <button type="button" class="btn-icon-only" id="close-modal-btn" aria-label="닫기">×</button>
      </div>
      <form id="run-form" class="run-form">
        <label class="field">
          <span class="field-label">러닝 타이틀</span>
          <div class="title-row">
            <button type="button" class="emoji-pick-btn" id="emoji-btn" title="이모지 변경" aria-label="이모지 변경">🏃</button>
            <input type="text" name="title" required placeholder="ex. 댕댕런" autocomplete="off" />
          </div>
        </label>
        <label class="field">
          <span class="field-label">날짜 및 시간</span>
          <input type="datetime-local" name="datetime" id="input-datetime" />
        </label>
        <div class="field">
          <span class="field-label">러너</span>
          <div class="runner-select" role="group" aria-label="러너 선택">
            <button type="button" class="runner-select__btn" data-runner="리지">리지</button>
            <button type="button" class="runner-select__btn" data-runner="애플">애플</button>
            <button type="button" class="runner-select__btn" data-runner="기타">기타</button>
          </div>
          <input type="text" name="runner" id="runner-input" placeholder="ex. 이름 입력" autocomplete="off" style="display:none; margin-top:0.5rem;" />
        </div>
        <label class="field">
          <span class="field-label">함께 달리는 사람들</span>
          <input type="text" name="partners" placeholder="ex. 슬기, 현아" autocomplete="off" />
        </label>
        <label class="field">
          <span class="field-label">장소</span>
          <input type="text" name="location" placeholder="ex. 반포한강공원" autocomplete="off" />
        </label>
        <label class="field">
          <span class="field-label">상세 내용</span>
          <textarea name="details" rows="4" placeholder="ex. 거리, 페이스, 준비물 등"></textarea>
        </label>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" id="cancel-btn">취소</button>
          <button type="submit" class="btn btn-primary">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Emoji picker modal -->
  <div class="modal-backdrop" id="emoji-picker-backdrop" hidden></div>
  <div class="modal emoji-picker-modal" id="emoji-picker-modal" role="dialog" aria-modal="true" aria-label="이모지 선택" hidden>
    <div class="modal-inner">
      <div class="modal-header">
        <h2 class="emoji-picker-modal__title">이모지 선택</h2>
        <button type="button" class="btn-icon-only" id="emoji-picker-close" aria-label="닫기">×</button>
      </div>
      <div class="emoji-picker__grid" id="emoji-picker-grid"></div>
    </div>
  </div>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
